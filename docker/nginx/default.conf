server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri; #Redirect all HTTP requests to HTTPS
}

server {
    listen 443 ssl;
    server_name localhost;

    client_max_body_size 15M;

    # --- POPUP PROBLEM HANDLING FOR GOOGLE AUTH ETC ---
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

    ssl_certificate     /etc/nginx/certs/dev.crt;
    ssl_certificate_key /etc/nginx/certs/dev.key;

    # ---- Serve Vite build output ----
    root /usr/share/nginx/html;
    index index.html;

    # ---- Proxy API calls ----
    location /api/ {
        proxy_pass http://api:8080/;
        proxy_http_version 1.1;

        proxy_set_header Host $host; #Passes the original host requested by the browser
        proxy_set_header X-Real-IP $remote_addr;#Passes the real client IP address seen by Nginx
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;#When multiple proxies are involved, appends each one
        proxy_set_header X-Forwarded-Proto https;#Original external request used HTTPS, backend itself receives HTTP from Nginx!
    }

    # ---- Proxy SignalR hubs ----
    location /hubs/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        
        proxy_read_timeout 86400;
    }

    # ---- SPA fallback (React Router) ----
    location / {
        try_files $uri $uri/ /index.html;
    }
}
